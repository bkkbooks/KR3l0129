body:
  text: 笑林吳人至京師為設食者有酪蘇未知是何物也強而食之歸吐遂至困頓謂其子曰與傖人同死亦無所恨然汝故宜慎之類聚七十二御覽八百五十八太原人夜失火出物欲出銅鎗誤出熨便大驚怪謂其兒曰異事二字類聚引有火未至鎗已被燒失腳書鈔一百三十五類聚七十二御覽七百五十七某甲廣記引作魏人夜暴疾命門人鑽火其夜陰暝不得火催之急廣記引作督迫頗急門人忿然曰君責之亦大無道理今闇如漆何以不把火照我我當得覓鑽火具類聚八十御覽八百六十九然後易得耳孔文舉聞之曰責人當以其方也廣記二百五十八有人弔喪并欲齎物助之問人可與何等物人荅曰錢布穀帛任卿所有爾因齎一斛豆置孝子前謂曰無可有以一斛大豆已上十四字据廣記引補相助孝子哭喚奈何己以為問豆荅曰可作飯孝子復哭喚窮己曰廣記引作孝子哭孤窮奈何曰造孝子更哭孤窮曰適有王利器本得便窮自當更送一斛類聚八十五廣記二百六十二沈珩弟峻字叔山有名譽而性儉吝張溫使蜀與峻別峻入內良久出語溫曰向擇一端布欲以王利器也送卿而無粗者溫嘉其能顯非已上亦見類聚八十五御覽八百二十續談助四又嘗經太湖岸上使從者取鹽水已而恨多敕令還減之尋亦自愧曰此吾天性也廣記一百十五六趙伯公類林作翁為人肥大夏日醉臥有數歲孫兒緣其肚上戲因以李子八九枚內其臍中既醒了不覺數日後乃知痛李大爛汁出以為臍穴懼死乃命妻子處分家事乃泣謂家人曰我腸爛將死明日李核出尋問乃知是孫兒所內李子也御覽三百七十一又九百六十六玉集十四類林雜說十桓帝時有人辭公府掾者倩人作奏記文人不能為作因語曰梁國葛龔先善為記文自可寫用不煩更作遂從人言寫記文不去葛龔名姓府君大驚不荅而罷故時人語曰作奏雖工宜去葛龔御覽四百九十六案後漢書葛龔傅注云龔善為文奏或有請龔奏以干人者龔為作之其人寫之忘自載其名因并寫龔名以進之故時人為之語曰作奏雖工宜去葛龔見笑林與御覽引異漢司徒崔烈辟上黨鮑堅為掾將謁見自慮不過問先到者儀適有荅曰隨典儀口倡既謁讚曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復著履上座將離席不知履所在讚者曰履著腳堅亦曰履著腳也御覽四百九十九楚人有擔山雞者路人問曰何鳥也擔者欺之曰鳳皇也路人曰我聞有鳳皇久矣今真見之汝賣之乎曰然乃酬千金弗與請加倍乃與之方將獻楚王經宿而鳥死路人不遑惜其金惟恨不得以獻耳國人傅之咸以為真鳳而貴宜欲獻之遂聞于楚王王感其欲獻己也召而厚賜之過買鳳之值十倍矣廣記四百六十一平原陶丘氏取勃海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女耳心恐女耳心恐既歸而遣婦婦臨去請罪夫曰曩見夫人年德以衰非昔日比亦恐新婦老後必復如此是以遣實無他故御覽四百九十九某甲為霸府佐為人都不解每至集會有聲樂之事己輒豫焉而恥不解妓人奏曲讚之己亦學人仰讚和同時人士令己作主人并使喚妓客妓客未集召妓具問曲吹一一疏著手巾箱下先有藥方客既集因問命曲先取所疏者誤得藥方便言是疏方有附子三分當歸四分己云且作附子當歸以送客合座絕倒御覽五百六十八南方人至京師者人戒之曰汝得物唯食慎勿問其名也往詣主人入門內見馬矢便食之覺惡臭乃止步進見敗屩棄於路因復嚼殊不可咽顧伴曰且止人言不可皆信後詣貴官為設食追一引作饌因見視曰汝是首物一引作戒故昔物且當勿食御覽六百九十八又八百五十一人有斫羹者以杓嘗之少鹽便益之後復嘗之向杓中者故云鹽不足如此數益升許鹽故不鹹因以為怪御覽八百六十一甲買肉過都入廁挂肉著外乙偷之未得去甲出覓肉因詐便口銜肉云挂著門外何得不失若如我銜肉著口豈有失理御覽八百六十二書鈔一百四十五姚彪與張溫俱至武昌遇吳興沈珩于江渚守風糧用盡遣人從彪貸鹽一百斛彪性峻直得書不荅方與溫談論良久敕左右倒鹽百斛著江水中謂溫曰明吾不惜惜所與耳廣記一百六十五御覽八百六十五楚人居貧讀淮南方得螳蜋伺蟬自鄣葉可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分別掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻始時恆答言見經日乃厭倦不堪紿云不見嘿然大喜齎葉入市對面取人物吏遂縛詣縣縣受辭自說本末官大笑放而不治御覽九百四十六漢世有人年老無子家富性儉嗇惡衣蔬食侵晨而起侵夜而息營理產業聚斂無厭而不敢自用或人從之求丐者不得已而入內取錢十自堂而出隨步輒減比至于外纔餘半在閉目以授乞者尋復囑云我傾家贍君慎勿他說復相效而來老人俄死田宅沒官貨財充于內帑矣廣記一百六十五有甲欲謁見邑宰問左右曰令何所好或語曰好公羊傅後入見令問君讀何書荅曰惟業公羊傅試問誰殺陳他者甲良久對曰平生實不殺陳他令察謬誤因復戲之曰君不殺陳他請是誰殺於是大怖徒跣走出人問其故乃大語曰見明府便以死事見訪後直不敢復來遇赦當出耳廣記二百六十甲與乙鬥爭甲齧下乙鼻官吏欲斷之甲稱乙自齧落吏曰夫人鼻高耳口低豈能就齧之乎甲曰他踏床子就齧之廣記二百六十二甲父母在出學三年而歸舅氏問其學何得并序別父久乃荅曰渭陽之思過于秦康既而父數之爾學奚益荅曰少失過庭之訓故學無益廣記二百六十二傖人欲相共弔喪各不知儀一人言粗習謂同伴曰汝隨我舉止既至喪所舊習者在前伏席上餘者一一相髡於背而為首者以足觸詈曰癡物諸人亦為儀當爾各以足相踏曰癡物最後者近孝子亦踏孝子而曰癡物廣記二百六十二有癡婿婦翁死婦教以行吊禮於路值水乃脫襪而渡惟遺一襪又睹林中鳩鳴云口郭鳥鴣口郭鳥鴣而私誦之都忘弔禮及至乃以有一襪一足立而縮其跣者但云口郭鳥鴣口郭鳥鴣孝子皆笑又曰莫笑莫笑如拾得襪即還我廣記二百六十二魯有執長竿入城門者初豎執之不可入橫執之亦不可入計無所出俄有老父至曰吾非聖人但見事多矣何不以鋸中截而入遂依而截之廣記二百六十二齊人就趙人學瑟因之先調膠柱而歸三年不成一曲齊人怪之有從趙來者問其意乃知向人之愚廣記二百六十二吳國胡邕為人好色娶妻張氏憐之不捨後卒邕亦亡家人便殯于後園中三年取葬見冢土化作二人常見抱如臥時人競笑之廣記三百八十九漢人有適吳吳人設筍問是何物語曰竹也歸煮其床簀而不熟乃謂其妻曰吳人轣轆欺我如此筍譜下紺珠集十一
