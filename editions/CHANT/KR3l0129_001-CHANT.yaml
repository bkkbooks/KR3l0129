body:
  text: 笑林吳人至京師為設食者有酪蘇未知是何物也強而食之歸吐遂至困頓謂其子曰與傖人同死亦無所恨然故宜慎之歐陽詢藝文類聚卷七十二太平御覽卷八百五十八太原人夜失火出物欲出銅鎗誤出熨㪷便大驚惋謂其兒曰異事火未至鎗已被燒失腳藝文類聚卷七十三太平御覽卷七百五十七某甲夜暴疾命門人鑽火其夜陰暝不得火催之急門人忿然曰君責人亦大無道理今闇如漆何以不把火照我我當得覓鑽火具然後易得耳孔文舉聞之曰責人當以其方也藝文類聚卷八十太平御覽卷八百六十九並引至鑽火具太平廣記卷二百五十八引有下二句有人弔喪并欲齎物助之問人可與何等物人曰錢布榖帛任卿所有爾因齎一斛豆置孝子前謂曰無可有以大豆一斛相助孝子哭喚奈何己以為問豆答曰可作飯孝子復哭喚窮己曰適有便窮自當更送一斛藝文類聚卷八十五太平廣記卷二百六十二吳沈珩弟峻字叔山有名譽而性儉吝張溫使蜀與峻別峻入內良久出語溫曰向擇一端布欲以送卿而無麤者溫嘉其能顯非又嘗經太湖岸上使從者取鹽水已而恨多敕令還減之尋亦自愧曰此吾天性也太平廣記卷一百六十五趙伯公肥大夏日醉臥孫兒緣其肚上戲因以李子內其臍中累七八枚既醉了不覺數日後乃知痛李大爛汁出以為臍穴懼死乃命妻子處分家事乃泣謂家人曰我腸爛將死明日李核出乃知孫兒所內李子也太平御覽卷三百七十又卷八百六十八兩引互有詳略今參合訂補桓帝時有人辟公府掾者倩人作奏記文人不能為作因語曰梁國葛龔先善為記文自可寫用不煩更作遂從人言寫記文不去葛龔名姓府君大驚不荅而罷歸故時人語曰作奏雖工宜去葛龔太平御覽卷四百九十六漢司徒崔烈辟上黨鮑堅為掾將謁見自慮不過問先到者儀適有荅曰隨典儀口唱既謁讚曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復著履上座將離席不知履所在讚者曰履著腳堅亦曰履著腳也太平御覽卷四百九十九平原陶邱氏取勃海墨台氏女女色甚美才堪令復相敬已生一男而歸母丁氏年老進見女壻女壻既歸而遣婦婦臨去請罪夫曰曩見夫人年德以衰非昔日比亦恐新婦老後必復如此是以遣實無他故同上某甲為霸府佐為人都不解每至集會有聲樂之事己輒豫焉而恥不解妓人奏曲讚之己亦學人仰讚和同時人士令己作主人并使喚妓客妓客未集召妓具問曲吹一一疏著手巾箱下先有藥方客既集因問命曲先取所疏者誤得藥方便言是疏方有附子三分當歸四分己云且作附子當歸以送客合座絕倒太平御覽卷五百六十八南方人至京師者人戒之曰汝得物唯食慎勿問其名也後詣主人入門內見馬屎便食之覺臭乃步進見敗屩棄於路因復嚼殊不可咽顧伴曰且止人言不可皆信後詣貴官為設䭔因見視曰汝是首物戒故昔且當勿食太平御覽卷六百九十八又卷八百五十一人有斫羹者以杓嘗之少鹽便益之後復嘗之向杓中者故云鹽不足如此數益升許鹽故不鹹因以為怪太平御覽卷八百六十一甲賣肉過入都廁挂肉著外乙偷之未得去甲出覓肉因詐便口銜肉云挂著外門何得不失若如我銜肉著口豈有失理太平御覽八百六十二北堂書鈔卷一百四十五陳禹謨補注姚彪與張溫俱至武昌遇吳興沈珩于江渚守風糧用盡遣人從彪貸鹽一百斛彪性峻直得書不荅方與溫談論良久勑左右倒鹽百斛著江水中謂溫曰明吾不惜惜所與耳太平御覽卷八百六十五太平廣記卷一百六十五楚人貧居讀淮南方得螳蜋伺蟬自鄣葉可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分別掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻始時恆答言見經日乃厭倦不堪紿云不見嘿然大喜齎葉入市對面取人物吏遂縛詣縣縣官受辭自說本末官大笑放而不治太平御覽卷九百四十六漢世有老人無子家富性儉嗇惡衣蔬食侵晨而起侵夜而息營理產業聚斂無厭而不敢自用或人從之求丐者不得已而入內取錢十自堂而出隨步輒減比至于外纔餘半在閉目以授乞者尋復囑云我傾家贍君慎勿他說復相效而來老人俄死田宅沒官貨財充于內帑矣太平廣記卷一百六十五有甲欲謁見邑宰問左右曰令何所好或語曰好公羊傳後入見令問君讀何書答曰唯業公羊傳試問誰殺陳他者甲良久對曰平生實不殺陳他令察謬誤因復戲之曰君不殺陳他請是誰殺於是大怖徒跣走出人問其故乃大語曰見明府便以死事見訪後直不敢復來遇赦當出耳太平廣記二百六十甲與乙鬭爭甲嚙下乙鼻官吏欲斷之甲稱乙自嚙落吏曰夫人鼻高耳口低豈能就嚙之乎甲曰他踏床子就嚙之太平廣記卷二百六十二甲父母在出學三年而歸舅氏問其學何得并序別父久乃答曰渭陽之思過於秦康既而父數之爾學奚益答曰少失過庭之訓故學無益傖人欲相共弔喪各不知儀一人言粗習謂同伴曰汝隨我舉止既至喪所舊習者在前伏席上餘者一一相髡於背而為首者以足觸詈曰癡物諸人亦為儀當爾各以足相踏曰癡物最後者近孝子亦踏孝子而曰癡物有癡壻婦翁死婦教以行弔禮於路值水乃脫襪而渡惟遺一襪又覩林中鳩鳴云𡅂鴣𡅂鴣而私誦之都忘弔禮及至乃以有襪一足立而縮其跣者但云𡅂鴣𡅂鴣孝子皆笑又曰莫笑莫笑如拾得襪即還我魯有執長竿入城門者初豎執之不可入橫執之亦不可入計無所出俄有老父至曰吾非聖人但見事多矣何不以鋸中截而入遂依而截之齊人就趙人學瑟因之先調膠柱而歸三年不成一曲齊人怪之有從趙來者問其意方知向人之愚並同上吳國胡邕為人好色娶妻張氏憐之不捨後卒邕亦亡家人便殯於後園中三年取葬見冢上化作二人常見抱如臥時人競笑之太平御覽卷三百八十九楚人有擔山雞者路人問曰何鳥也擔者欺之曰鳳凰也路人曰我聞有鳳凰久矣今真見之汝賣之乎曰然乃酬千金弗與請加倍乃與之方將獻楚王經宿而鳥死路人不遑惜其金惟恨不得以獻耳國人傳之咸以為真鳳而貴宜欲獻之遂聞于楚王王感其欲獻己也召而厚賜之過買鳳之值十倍矣太平廣記卷四百六十一漢人有適吳吳人設筍問是何物語曰竹也歸煮其床簀而不熟乃謂其妻曰吳人轣轆欺我如此釋贊寧筍譜卷下
